version: "3.9"
services:
  backend:
    build: .
    ports:
      - "${BACKEND_HOST_PORT:-7001}:7000"
    environment:
      PORT: "7000"
      SANDBOX_DRIVER: "docker"

  dashboard:
    build: ./apps/dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${BACKEND_HOST_PORT:-7001}"
    depends_on:
      - backend
